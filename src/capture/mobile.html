<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Capture</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0; padding: 16px; background: #f5f5f7; color: #1c1c1e;
    }
    h1 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    .hint { color: #6e6e73; margin-bottom: 16px; font-size: 14px; }
    .primary, .done {
      width: 100%; padding: 14px; border: 0; border-radius: 12px;
      font-size: 17px; font-weight: 600; margin-bottom: 16px;
      cursor: pointer; display: block; text-align: center;
    }
    .primary { background: #007aff; color: white; }
    .done { background: #34c759; color: white; }
    .done:disabled { background: #c7c7cc; cursor: not-allowed; }
    .photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .photo {
      aspect-ratio: 1; background: #fff; border-radius: 8px; overflow: hidden;
      position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo button {
      position: absolute; top: 4px; right: 4px; width: 24px; height: 24px;
      border: 0; border-radius: 50%; background: rgba(0,0,0,0.6); color: white;
      font-size: 14px; line-height: 1; cursor: pointer;
    }
    .meta { color: #6e6e73; font-size: 13px; text-align: center; margin: 12px 0; }
    .banner {
      padding: 12px; background: #ffd60a; color: #1c1c1e; border-radius: 8px;
      margin-bottom: 16px; font-size: 14px; display: none;
    }
    .banner.visible { display: block; }
    .success {
      background: #34c759; color: white; padding: 24px; border-radius: 12px;
      text-align: center; font-size: 18px; font-weight: 600; display: none;
    }
    .success.visible { display: block; }
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <h1 id="title">Capture</h1>
  <div id="hint" class="hint"></div>
  <div id="banner" class="banner"></div>

  <label class="primary" for="picker" id="capture-btn">📷 Take Photo</label>
  <input type="file" id="picker" accept="image/*" capture="environment">

  <div id="photos" class="photos"></div>
  <div id="meta" class="meta">No photos yet.</div>

  <button id="done" class="done" disabled>Done &amp; Process</button>

  <div id="success" class="success">✅ Sent. You can close this tab.</div>

<script>
(function () {
  var TOKEN = location.pathname.split("/").pop();
  var photosEl = document.getElementById("photos");
  var metaEl = document.getElementById("meta");
  var doneEl = document.getElementById("done");
  var bannerEl = document.getElementById("banner");
  var successEl = document.getElementById("success");
  var titleEl = document.getElementById("title");
  var hintEl = document.getElementById("hint");
  var pickerEl = document.getElementById("picker");

  var photos = [];

  function render() {
    photosEl.innerHTML = "";
    photos.forEach(function (p) {
      var div = document.createElement("div");
      div.className = "photo";
      var img = document.createElement("img");
      img.src = p.dataUrl;
      div.appendChild(img);
      var btn = document.createElement("button");
      btn.textContent = "×";
      btn.onclick = function () { removePhoto(p.index); };
      div.appendChild(btn);
      photosEl.appendChild(div);
    });
    metaEl.textContent = photos.length === 0
      ? "No photos yet."
      : photos.length + " photo" + (photos.length === 1 ? "" : "s");
    doneEl.disabled = photos.length === 0;
  }

  function refreshManifest() {
    fetch("/api/capture/manifest/" + TOKEN)
      .then(function (res) {
        if (!res.ok) {
          bannerEl.textContent = "Session not found or expired.";
          bannerEl.classList.add("visible");
          doneEl.disabled = true;
          return null;
        }
        return res.json();
      })
      .then(function (m) {
        if (!m) return;
        titleEl.textContent = "Capture for " + (m.contextHint || "");
        hintEl.textContent = "Tap to take photos. Tap Done when finished.";
        if (m.state !== "open") {
          bannerEl.textContent = "Session " + m.state + ".";
          bannerEl.classList.add("visible");
          doneEl.disabled = true;
        }
      })
      .catch(function () { /* ignore — operator may be offline */ });
  }

  function handleFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var dataUrl = reader.result;
      var fd = new FormData();
      fd.append("file", file);
      fetch("/api/capture/upload?token=" + encodeURIComponent(TOKEN), {
        method: "POST",
        body: fd
      }).then(function (res) {
        if (!res.ok) {
          return res.json().catch(function () { return {}; }).then(function (err) {
            alert("Upload failed: " + (err.error || res.status));
          });
        }
        return res.json().then(function (body) {
          photos.push({ index: body.photoIndex, dataUrl: dataUrl });
          render();
        });
      });
    };
    reader.readAsDataURL(file);
  }

  function removePhoto(index) {
    fetch("/api/capture/delete-photo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: TOKEN, index: index })
    }).then(function (res) {
      if (res.ok) {
        photos = photos.filter(function (p) { return p.index !== index; });
        render();
      }
    });
  }

  pickerEl.addEventListener("change", function (e) {
    var file = e.target.files[0];
    handleFile(file);
    e.target.value = "";
  });

  doneEl.addEventListener("click", function () {
    if (!confirm("Process " + photos.length + " photo(s)?")) return;
    doneEl.disabled = true;
    fetch("/api/capture/finalize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: TOKEN })
    }).then(function (res) {
      if (res.ok) {
        successEl.classList.add("visible");
        document.getElementById("capture-btn").style.display = "none";
        photosEl.style.display = "none";
        metaEl.style.display = "none";
        doneEl.style.display = "none";
      } else {
        return res.json().catch(function () { return {}; }).then(function (err) {
          alert("Finalize failed: " + (err.error || res.status));
          doneEl.disabled = false;
        });
      }
    });
  });

  refreshManifest();
  setInterval(refreshManifest, 5000);
})();
</script>
</body>
</html>
